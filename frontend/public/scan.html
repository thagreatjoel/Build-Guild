<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Scan QR — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; }
    #reader { width: 100%; }
    .result { margin-top: 20px; }
    .back-btn { margin-top: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📷 Scan QR Code</h1>
    <div id="reader"></div>
    <div id="scan-result" class="msg" style="margin-top: 12px; display: none;"></div>
    <div class="back-btn">
      <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) {
      window.location.href = '/admin.html';
    }

    let scanner;
    function startScanner() {
      scanner = new Html5Qrcode("reader");
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decoded) => {
        handleScan(decoded);
      }, (err) => { console.log(err); });
    }

    async function handleScan(qrToken) {
      try {
        const res = await fetch(`${API_BASE_URL}/api/admin/scan`, {
          method: 'POST',
          headers: { 'x-auth-token': token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: qrToken })
        });
        const data = await res.json();
        const resultDiv = document.getElementById('scan-result');
        if (res.ok) {
          resultDiv.textContent = `✅ ${data.msg}`;
          resultDiv.className = 'msg ok';
          resultDiv.style.display = 'block';
          // Optional: beep or vibrate? Just show success.
          setTimeout(() => resultDiv.style.display = 'none', 3000);
        } else {
          resultDiv.textContent = `❌ ${data.msg}`;
          resultDiv.className = 'msg err';
          resultDiv.style.display = 'block';
          setTimeout(() => resultDiv.style.display = 'none', 3000);
        }
      } catch (err) {
        console.error(err);
      }
    }

    startScanner();
  </script>
</body>
</html>
