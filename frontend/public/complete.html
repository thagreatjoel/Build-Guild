<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Complete — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .success-card {
      background: var(--bp-darker);
      border: 2px solid var(--bp-warning);
      padding: 40px;
      max-width: 400px;
      animation: rise 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    .countdown {
      margin-top: 20px;
      font-size: 14px;
      color: var(--bp-light);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div style="font-size: 64px;">🎉</div>
    <h1 style="color: var(--bp-warning); margin: 20px 0 10px;">Registration Complete!</h1>
    <p>Your QR code has been sent to your email.<br>Check your inbox (and spam folder).</p>
    <div class="countdown">Redirecting to your pass in <span id="countdown">5</span> seconds...</div>
    <div style="margin-top: 20px;">
      <a href="/" class="btn btn-outline">← Back to Home</a>
    </div>
  </div>

  <script>
    // Trigger confetti
    canvasConfetti({
      particleCount: 200,
      spread: 100,
      origin: { y: 0.6 },
      colors: ['#ffc857', '#ffffff', '#0e305b']
    });
    canvasConfetti({
      particleCount: 100,
      spread: 120,
      origin: { y: 0.7, x: 0.3 }
    });
    canvasConfetti({
      particleCount: 100,
      spread: 120,
      origin: { y: 0.7, x: 0.7 }
    });

    // Countdown and redirect
    let seconds = 5;
    const countdownEl = document.getElementById('countdown');
    const interval = setInterval(() => {
      seconds--;
      if (seconds <= 0) {
        clearInterval(interval);
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
          window.location.href = `/pass.html?email=${encodeURIComponent(email)}`;
        } else {
          window.location.href = '/';
        }
      } else {
        countdownEl.textContent = seconds;
      }
    }, 1000);
  </script>
</body>
</html>
