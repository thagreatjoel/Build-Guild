<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Not Started — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <style>
    .waiting-container { text-align: center; max-width: 500px; margin: 0 auto; }
    .status-message { font-size: 20px; margin: 20px 0; color: var(--bp-warning); }
    .banner-link { position: fixed; top: 20px; left: 0px; z-index: 999; }
    .banner-link img { width: 180px; max-width: 25vw; height: auto; border: 0; }
  </style>
</head>
<body>
  <a href="https://hackclub.com/" class="banner-link">
    <img src="https://assets.hackclub.com/banners/2026.svg" alt="Hack Club">
  </a>

  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <div class="view active z1">
    <div class="card waiting-container">
  <div class="card-eyebrow">Build Guild Kochi · April 15, 2026</div>
  <div class="card-h1">Welcome, <span id="user-name" style="color:var(--bp-warning)">...</span></div>
  <div class="status-message">Event will start at 10:00 AM IST on April 15, 2026</div>
  <div class="card-sub">You'll be automatically redirected when the event opens.</div>
  <button class="btn btn-outline" onclick="logout()">Logout</button>
</div>

  </div>

  <div id="toast" class="toast"></div>

  <script>
    
  const session = JSON.parse(localStorage.getItem('eventAccess') || '{}');
  if (session.displayName) {
    document.getElementById('user-name').textContent = session.displayName;
  } else if (session.username) {
    document.getElementById('user-name').textContent = session.username;
  } else {
    document.getElementById('user-name').textContent = 'Guest';
  }

  
    function logout() {
      localStorage.removeItem('eventAccess');
      window.location.href = '/';
    }

    async function checkEventStatus() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/admin/event-status`);
        const data = await res.json();
        if (data.isOpen) {
          window.location.href = '/event-dashboard.html';
        }
      } catch (err) {
        console.error('Failed to check event status:', err);
      }
    }

    setInterval(checkEventStatus, 5000);
    checkEventStatus();
  </script>
</body>
</html>
