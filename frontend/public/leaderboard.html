<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — Build Guild Kochi</title>
  <!-- Phantom Sans (Hack Club's font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Phantom Sans (Hack Club's actual font) ── */
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff') format('woff');
      font-weight:400;font-style:normal;font-display:swap;
    }
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff') format('woff');
      font-weight:700;font-style:normal;font-display:swap;
    }

    :root {
      --bp-dark: #0e305b;
      --bp-darker: #081c35;
      --bp-warning: #ffc857;
      --bp-success: #a8f0ae;
      --font-content: 'Phantom Sans', 'Poppins', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-content);
      background: var(--bp-dark);
      color: #fff;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 50px 50px;
      background-position: 0 0, 0 0;
      background-color: var(--bp-dark);
      position: relative;
    }

    /* Grain overlay (exactly as Blueprint) */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse, #000000b1, transparent);
      opacity: .4;
      filter: url(#grainy);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }

    /* SVG filter (grain) */
    svg {
      position: fixed;
      width: 0;
      height: 0;
    }

    .z1 {
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Header */
    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .hero h1 {
      font-family: var(--font-content);
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffc857, #ff9f1c);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    .hero p {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      margin-top: 0.5rem;
    }

    /* Leaderboard card (same style as Blueprint cards) */
    .card {
      background: var(--bp-darker);
      border: 2px solid rgba(255,255,255,.14);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(2px);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .stats span:first-child {
      font-weight: 500;
      color: rgba(255,255,255,0.6);
    }
    .stats span:last-child {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--bp-warning);
    }

    .refresh-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.5rem 1rem;
      font-family: var(--font-content);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1.5rem;
      color: #fff;
    }
    .refresh-btn:hover {
      background: rgba(255,200,87,0.2);
      border-color: var(--bp-warning);
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s;
    }
    .leaderboard-item:hover {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding-left: 8px;
    }
    .rank {
      width: 70px;
      font-weight: 800;
      font-size: 1.2rem;
    }
    .rank.top-1 { color: #ffd700; }
    .rank.top-2 { color: #c0c0c0; }
    .rank.top-3 { color: #cd7f32; }
    .user-info {
      flex: 1;
    }
    .username {
      font-weight: 700;
      font-size: 1rem;
    }
    .email {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
    }
    .score {
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--bp-warning);
      background: rgba(255,200,87,0.1);
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
      min-width: 70px;
      text-align: center;
    }

    .empty-message {
      text-align: center;
      padding: 3rem;
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
    }

    /* Fixed Hack Club banner */
    .banner-link {
      position: fixed;
      top: 20px;
      left: 0px;
      z-index: 999;
    }
    .banner-link img {
      width: 180px;
      max-width: 25vw;
      height: auto;
      border: 0;
    }

    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .hero h1 { font-size: 2rem; }
      .rank { width: 50px; font-size: 1rem; }
      .score { font-size: 0.9rem; min-width: 60px; }
      .username { font-size: 0.9rem; }
      .stats span:last-child { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <a href="https://hackclub.com/" class="banner-link">
    <img src="https://assets.hackclub.com/banners/2026.svg" alt="Hack Club">
  </a>

  <div class="container z1">
    <div class="hero">
      <h1>🏆 Leaderboard</h1>
      <p>Top builders who've checked in</p>
    </div>

    <div class="card">
      <div class="stats">
        <span>✨ Qualified Participants</span>
        <span id="total-users">—</span>
      </div>
      <div style="text-align: right;">
        <button class="refresh-btn" onclick="loadLeaderboard()">⟳ Refresh</button>
      </div>
      <div id="leaderboard-list" class="leaderboard-list">Loading...</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    async function loadLeaderboard() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/user/leaderboard`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const users = await res.json();

        document.getElementById('total-users').textContent = users.length;

        const container = document.getElementById('leaderboard-list');
        if (users.length === 0) {
          container.innerHTML = '<div class="empty-message">No participants yet.<br>Check back after the event starts!</div>';
          return;
        }

        container.innerHTML = users.map((user, index) => {
          let rankClass = '';
          if (index === 0) rankClass = 'top-1';
          else if (index === 1) rankClass = 'top-2';
          else if (index === 2) rankClass = 'top-3';
          const rankIcon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`;
          return `
            <div class="leaderboard-item">
              <div class="rank ${rankClass}">${rankIcon}</div>
              <div class="user-info">
                <div class="username">${escapeHtml(user.username || user.name || user.email.split('@')[0])}</div>
                <div class="email">${escapeHtml(user.email)}</div>
              </div>
              <div class="score">${user.score || 0} pts</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Leaderboard error:', err);
        container.innerHTML = '<div class="empty-message">Failed to load leaderboard. Please try again later.</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
  </script>
</body>
</html>
