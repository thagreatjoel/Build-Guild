<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Phantom Sans (Hack Club's actual font) ── */
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff') format('woff');
      font-weight:400;font-style:normal;font-display:swap;
    }
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff') format('woff');
      font-weight:700;font-style:normal;font-display:swap;
    }

    :root {
      --bp-dark: #0e305b;
      --bp-darker: #081c35;
      --bp-warning: #ffc857;
      --bp-success: #a8f0ae;
      --font-content: 'Phantom Sans', 'Poppins', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-content);
      background: var(--bp-dark);
      color: #fff;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 50px 50px;
      background-position: 0 0, 0 0;
      background-color: var(--bp-dark);
      position: relative;
      min-height: 100vh;
    }

    /* Grain overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse, #000000b1, transparent);
      opacity: .4;
      filter: url(#grainy);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }

    svg {
      position: fixed;
      width: 0;
      height: 0;
    }

    .z1 {
      position: relative;
      z-index: 1;
    }

    /* Main container */
    .dashboard {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Header */
    .header {
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--bp-warning);
    }
    .header p {
      color: rgba(255,255,255,0.6);
      margin-top: 0.25rem;
    }

    /* Two‑column layout */
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }

    /* Cards */
    .card {
      background: var(--bp-darker);
      border: 2px solid rgba(255,255,255,.14);
      border-radius: 24px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: transform 0.2s;
    }
    .card h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--bp-warning);
    }

    /* Project list */
    .project-item {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 0.75rem 0;
    }
    .project-item:last-child {
      border-bottom: none;
    }
    .project-title {
      font-weight: 700;
      font-size: 1rem;
    }
    .project-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.25rem;
    }
    .project-status {
      color: var(--bp-success);
      font-weight: 500;
    }

    /* Announcement */
    .announcement {
      background: rgba(255,200,87,0.1);
      border-left: 4px solid var(--bp-warning);
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1rem;
    }
    .announcement h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--bp-warning);
      margin-bottom: 0.5rem;
    }
    .announcement p {
      font-size: 0.9rem;
      line-height: 1.4;
      color: rgba(255,255,255,0.8);
    }

    /* Staff picks */
    .staff-picks {
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      padding: 1rem;
      margin-top: 1rem;
    }
    .staff-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .staff-name {
      font-weight: 600;
    }
    .staff-score {
      background: var(--bp-warning);
      color: var(--bp-darker);
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .logout-btn {
      margin-top: 1.5rem;
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 40px;
      padding: 0.5rem;
      font-family: var(--font-content);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }
    .logout-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--bp-warning);
    }

    /* Banner fixed top-left */
    .banner-link {
      position: fixed;
      top: 20px;
      left: 0px;
      z-index: 999;
    }
    .banner-link img {
      width: 180px;
      max-width: 25vw;
      height: auto;
      border: 0;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .dashboard {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <a href="https://hackclub.com/" class="banner-link">
    <img src="https://assets.hackclub.com/banners/2026.svg" alt="Hack Club">
  </a>

  <div class="dashboard z1">
    <div class="header">
      <h1>Dashboard</h1>
      <p>Here's what's cooking today</p>
    </div>

    <div class="grid">
      <!-- Left column -->
      <div>
        <div class="card">
          <h2>Your achievements</h2>
          <div id="user-stats" class="project-item" style="border-bottom: none; padding: 0 0 0.5rem 0;">
            <!-- filled by JS -->
          </div>
          <div id="user-projects">
            <!-- dynamic content -->
          </div>
        </div>

        <div class="card">
          <h2>Upcoming events</h2>
          <div class="announcement">
            <h3>🎉 BUILD GUILD KOCHI IS LIVE!</h3>
            <p>The event runs on April 15, 2026, from 10:00 AM IST. Check the schedule and don't miss the surprise!</p>
          </div>
        </div>
      </div>

      <!-- Right column -->
      <div>
        <div class="card">
          <h2>🏆 Staff Picks!</h2>
          <div id="staff-picks-list" class="staff-picks">
            <!-- filled by JS -->
          </div>
          <button class="logout-btn" onclick="logout()">Log out</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const session = JSON.parse(localStorage.getItem('eventAccess') || '{}');
    if (!session.loggedIn || Date.now() - session.timestamp > 24 * 60 * 60 * 1000) {
      window.location.href = '/';
    }

    const userEmail = session.email;
    const userName = session.displayName || session.username || userEmail.split('@')[0];

    // Fetch user data (score, check-in status) and top 5 staff picks
    async function loadDashboard() {
      try {
        // Get current user's data
        const userRes = await fetch(`${API_BASE_URL}/api/user/by-email?email=${encodeURIComponent(userEmail)}`);
        const userData = await userRes.json();

        // Update stats area
        const statsDiv = document.getElementById('user-stats');
        statsDiv.innerHTML = `
          <div class="project-title">👤 ${userName}</div>
          <div class="project-meta">${userEmail}</div>
          <div class="project-meta">🏅 Score: <span class="project-status">${userData.score || 0} points</span></div>
          <div class="project-meta">✅ Checked in: ${userData.checkedIn ? 'Yes' : 'Not yet'}</div>
        `;

        // "Your projects" could be replaced with earned badges or points history; here we show a simple message
        const projectsDiv = document.getElementById('user-projects');
        projectsDiv.innerHTML = `
          <div class="project-item">
            <div class="project-title">✨ Points earned</div>
            <div class="project-meta">You have ${userData.score || 0} points from activities.</div>
            <div class="project-status">Keep participating to earn more!</div>
          </div>
          <div class="project-item">
            <div class="project-title">📅 Event schedule</div>
            <div class="project-meta">Check the full timeline at the entrance.</div>
            <div class="project-status">Don't miss the surprise at 7 PM!</div>
          </div>
        `;

        // Fetch top 5 users for Staff Picks (checked in, score > 0, sorted by score)
        const leaderRes = await fetch(`${API_BASE_URL}/api/user/leaderboard`);
        const topUsers = await leaderRes.json();
        const top5 = topUsers.slice(0, 5);

        const picksDiv = document.getElementById('staff-picks-list');
        if (top5.length === 0) {
          picksDiv.innerHTML = '<div class="staff-item">No picks yet – be the first!</div>';
        } else {
          picksDiv.innerHTML = top5.map(u => `
            <div class="staff-item">
              <span class="staff-name">${escapeHtml(u.username || u.name || u.email.split('@')[0])}</span>
              <span class="staff-score">${u.score} pts</span>
            </div>
          `).join('');
        }
      } catch (err) {
        console.error('Dashboard error:', err);
        document.getElementById('user-stats').innerHTML = '<div class="project-item">Error loading data. Please refresh.</div>';
      }
    }

    function logout() {
      // Optionally call login-status endpoint to mark logout
      fetch(`${API_BASE_URL}/api/user/login-status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, loggedIn: false })
      }).catch(console.error);
      localStorage.removeItem('eventAccess');
      window.location.href = '/';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadDashboard();
    setInterval(loadDashboard, 30000); // refresh every 30 seconds
  </script>
</body>
</html>
