<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Leaderboard — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <style>
    /* Additional custom styles for leaderboard */
    .leaderboard-container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      padding: 20px 20px 0;
    }
    .leaderboard-card {
      background: var(--bp-darker);
      border: 2px solid rgba(255,255,255,.14);
      padding: 32px 36px;
      margin-bottom: 24px;
      animation: rise 0.5s cubic-bezier(.16,1,.3,1);
    }
    .leaderboard-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .leaderboard-header h1 {
      font-family: var(--fh);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .leaderboard-header .highlight {
      color: var(--bp-warning);
    }
    .stats-summary {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 16px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .stats-summary span:first-child {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
    }
    .stats-summary span:last-child {
      font-size: 28px;
      font-weight: 800;
      color: var(--bp-warning);
    }
    .leaderboard-list {
      display: flex;
      flex-direction: column;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .leaderboard-item:last-child {
      border-bottom: none;
    }
    .rank {
      width: 70px;
      font-weight: 800;
      font-size: 18px;
      color: var(--bp-warning);
    }
    .rank.top-1 { color: #ffd700; }
    .rank.top-2 { color: #c0c0c0; }
    .rank.top-3 { color: #cd7f32; }
    .user-info {
      flex: 1;
    }
    .username {
      font-family: var(--fh);
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 2px;
    }
    .email {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .score {
      font-weight: 800;
      font-size: 20px;
      color: var(--bp-warning);
      background: rgba(255,200,87,0.1);
      padding: 4px 12px;
      border-radius: 40px;
      min-width: 80px;
      text-align: center;
    }
    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .refresh-btn:hover {
      background: rgba(255,200,87,0.2);
      border-color: var(--bp-warning);
    }
    .empty-message {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    @media (max-width: 700px) {
      .leaderboard-card {
        padding: 24px;
      }
      .leaderboard-header h1 {
        font-size: 28px;
      }
      .rank {
        width: 50px;
        font-size: 16px;
      }
      .username {
        font-size: 16px;
      }
      .score {
        font-size: 16px;
        min-width: 70px;
      }
    }
    @media (max-width: 480px) {
      .leaderboard-card {
        padding: 16px;
      }
      .rank {
        width: 45px;
        font-size: 14px;
      }
      .username {
        font-size: 14px;
      }
      .score {
        font-size: 14px;
        min-width: 60px;
        padding: 2px 8px;
      }
      .stats-summary span:last-child {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <div class="leaderboard-container z1">
    <div class="leaderboard-card">
      <div class="leaderboard-header">
        <h1>🏆 <span class="highlight">Leaderboard</span></h1>
      </div>
      <div class="stats-summary">
        <span>✨ Top builders</span>
        <span id="total-users">—</span>
      </div>
      <div style="text-align: right;">
        <button class="refresh-btn" onclick="loadLeaderboard()">⟳ Refresh</button>
      </div>
      <div id="leaderboard-list" class="leaderboard-list">Loading...</div>
    </div>
  </div>

  <script>
    async function loadLeaderboard() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/user/leaderboard`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const users = await res.json();

        document.getElementById('total-users').textContent = users.length;

        const container = document.getElementById('leaderboard-list');
        if (users.length === 0) {
          container.innerHTML = '<div class="empty-message">No participants yet.<br>Check back after the event starts!</div>';
          return;
        }

        container.innerHTML = users.map((user, index) => {
          let rankClass = '';
          if (index === 0) rankClass = 'top-1';
          else if (index === 1) rankClass = 'top-2';
          else if (index === 2) rankClass = 'top-3';
          const rankIcon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`;
          return `
            <div class="leaderboard-item">
              <div class="rank ${rankClass}">${rankIcon}</div>
              <div class="user-info">
                <div class="username">${escapeHtml(user.username || user.name || user.email.split('@')[0])}</div>
                <div class="email">${escapeHtml(user.email)}</div>
              </div>
              <div class="score">${user.score || 0} pts</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Leaderboard error:', err);
        document.getElementById('leaderboard-list').innerHTML = '<div class="empty-message">Failed to load leaderboard. Please try again later.</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
  </script>
</body>
</html>
