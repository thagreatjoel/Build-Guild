<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Leaderboard — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Exactly the same background as index.html ── */
    @font-face {
  font-family:'Phantom Sans';
  src: url('../font/rc-fullbasic.ttf') format('truetype');
  font-weight:400;font-style:normal;font-display:swap;
}
@font-face {
  font-family:'Phantom Sans';
  src: url('../font/rc-fullbasic.ttf') format('truetype');
  font-weight:700;font-style:normal;font-display:swap;
}

    :root{
      --bp-lighter:#344b6a;
      --bp-dark:#0e305b;
      --bp-darker:#081c35;
      --bp-light:#dbe4ee;
      --bp-danger:#fe8e86;
      --bp-danger-darker:#bd4c44;
      --bp-warning:#ffc857;
      --bp-success:#a8f0ae;
      --f:'Phantom Sans','Poppins',sans-serif;
      --fh:'Poppins',sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: var(--f);
      background: var(--bp-dark);
      color: #fff;
      min-height: 100vh;
      overscroll-behavior: none;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 50px 50px;
      background-position: 0 0, 0 0;
      background-color: var(--bp-dark);
      animation: moveGrid 10s linear infinite;
      position: relative;
    }

    /* Grain overlay – same as index.html */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse, #000000b1, transparent);
      opacity: .4;
      filter: url(#grainy);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }

    .z1 {
      position: relative;
      z-index: 1;
    }

    /* Banner fixed top‑left */
    .banner-link {
      position: fixed;
      top: 20px;
      left: 0px;
      z-index: 999;
    }
    .banner-link img {
      width: 180px;
      max-width: 25vw;
      height: auto;
      border: 0;
    }

    /* Main container – full height, padded to clear the banner */
    .leaderboard-container {
      width: 100%;
      height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(80px, 12vh, 120px) 4vw 2vh 4vw;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Title and date */
    .hero-title {
      text-align: center;
      flex-shrink: 0;
      margin-bottom: 2vh;
    }
    .hero-title h1 {
      font-family: var(--fh);
      font-size: clamp(2rem, 6vh, 5rem);
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 0.25vh;
    }
    .hero-title .highlight {
      color: var(--bp-warning);
    }
    .event-date {
      font-size: clamp(0.8rem, 2vh, 1.2rem);
      color: rgba(255,255,255,0.6);
      margin-top: 0;
    }

    /* Card – same dark background as index.html cards */
    .leaderboard-card {
      background: var(--bp-darker);
      border: 2px solid rgba(255,255,255,.14);
      padding: 1.5vh 2vw;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Stats summary row */
    .stats-summary {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1vh 0 1.5vh;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 1.5vh;
    }
    .stats-summary span:first-child {
      font-size: clamp(0.8rem, 1.5vh, 1rem);
      color: rgba(255,255,255,0.6);
    }
    .stats-summary span:last-child {
      font-size: clamp(1.2rem, 3vh, 2rem);
      font-weight: 800;
      color: var(--bp-warning);
    }

    /* Refresh button */
    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.5rem 1rem;
      font-family: var(--fh);
      font-size: clamp(0.7rem, 1.2vh, 0.9rem);
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
      margin-bottom: 1.5vh;
      align-self: flex-end;
    }
    .refresh-btn:hover {
      background: rgba(255,200,87,0.2);
      border-color: var(--bp-warning);
    }

    /* Leaderboard list */
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 0.5vh;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 1vh 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .leaderboard-item:last-child {
      border-bottom: none;
    }
    .rank {
      width: 12vw;
      min-width: 60px;
      font-weight: 800;
      font-size: clamp(1rem, 2.2vh, 1.4rem);
      color: var(--bp-warning);
    }
    .rank.top-1 { color: #ffd700; }
    .rank.top-2 { color: #c0c0c0; }
    .rank.top-3 { color: #cd7f32; }
    .user-info {
      flex: 1;
      padding-left: 1.5vw;
      border-left: 2px solid rgba(255,200,87,0.25);
    }
    .username {
      font-family: var(--fh);
      font-weight: 700;
      font-size: clamp(0.9rem, 2.2vh, 1.3rem);
      color: #fff;
      margin-bottom: 0.2vh;
    }
    .email {
      font-size: clamp(0.7rem, 1.5vh, 0.8rem);
      color: rgba(255,255,255,0.6);
    }
    .score {
      font-weight: 800;
      font-size: clamp(1rem, 2.2vh, 1.4rem);
      color: var(--bp-warning);
      background: rgba(255,200,87,0.1);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      min-width: 80px;
      text-align: center;
    }

    .empty-message {
      text-align: center;
      padding: 4vh;
      color: rgba(255,255,255,0.5);
      font-size: clamp(0.8rem, 1.5vh, 1rem);
    }

    /* Sponsors */
    .sponsors {
      flex-shrink: 0;
      text-align: center;
      padding: 1vh 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 1vh;
    }
    .sponsors-label {
      font-size: clamp(0.6rem, 1.3vh, 0.8rem);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.5vh;
    }
    .sponsor-logos {
      display: flex;
      justify-content: center;
      gap: clamp(1rem, 3vw, 3rem);
      flex-wrap: wrap;
    }
    .sponsor {
      font-weight: 700;
      font-size: clamp(0.8rem, 1.8vh, 1.2rem);
      color: rgba(255,255,255,0.7);
    }

    /* Responsive adjustments – same as schedule */
    @media (max-width: 700px) {
      .leaderboard-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .rank {
        width: auto;
        margin-bottom: 4px;
      }
      .user-info {
        padding-left: 0;
        border-left: none;
        border-top: 1px solid rgba(255,200,87,0.25);
        padding-top: 6px;
        margin-top: 4px;
        width: 100%;
      }
      .score {
        align-self: flex-start;
        margin-top: 6px;
      }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <!-- Banner fixed to top‑left -->
  <a href="https://hackclub.com/" class="banner-link">
    <img src="https://assets.hackclub.com/banners/2026.svg" alt="Hack Club">
  </a>

  <div class="leaderboard-container z1">
    <div class="hero-title">
      <h1>
        <span class="schedule-text">🏆</span>
        <span class="highlight"> Leaderboard</span>
      </h1>
      <div class="event-date">Top builders who've checked in</div>
    </div>

    <div class="leaderboard-card">
      <div class="stats-summary">
        <span>✨ Qualified participants</span>
        <span id="total-users">—</span>
      </div>
      <button class="refresh-btn" onclick="loadLeaderboard()">⟳ Refresh</button>
      <div id="leaderboard-list" class="leaderboard-list">Loading...</div>
    </div>

    <div class="sponsors">
      <div class="sponsors-label">Proudly supported by</div>
      <div class="sponsor-logos">
        <span class="sponsor">HACKCLUB</span>
        <span class="sponsor">BLUEPRINT</span>
        <span class="sponsor">JLCPCB</span>
        <span class="sponsor">OSHWELD</span>
        <span class="sponsor">EASYEDA</span>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    async function loadLeaderboard() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/user/leaderboard`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const users = await res.json();

        document.getElementById('total-users').textContent = users.length;

        const container = document.getElementById('leaderboard-list');
        if (users.length === 0) {
          container.innerHTML = '<div class="empty-message">No participants yet.<br>Check back after the event starts!</div>';
          return;
        }

        container.innerHTML = users.map((user, index) => {
          let rankClass = '';
          if (index === 0) rankClass = 'top-1';
          else if (index === 1) rankClass = 'top-2';
          else if (index === 2) rankClass = 'top-3';
          const rankIcon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`;
          return `
            <div class="leaderboard-item">
              <div class="rank ${rankClass}">${rankIcon}</div>
              <div class="user-info">
                <div class="username">${escapeHtml(user.username || user.name || user.email.split('@')[0])}</div>
                <div class="email">${escapeHtml(user.email)}</div>
              </div>
              <div class="score">${user.score || 0} pts</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Leaderboard error:', err);
        document.getElementById('leaderboard-list').innerHTML = '<div class="empty-message">Failed to load leaderboard. Please try again later.</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
  </script>
</body>
</html>
