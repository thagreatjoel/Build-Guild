<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <style>
    .leaderboard-container { max-width: 800px; margin: 0 auto; }
    .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .rank { font-weight: bold; color: var(--bp-warning); width: 60px; font-size: 18px; }
    .user-info { flex: 3; }
    .username { font-weight: bold; font-size: 16px; }
    .email { font-size: 11px; color: rgba(255,255,255,0.5); }
    .score { font-weight: bold; font-size: 20px; color: var(--bp-warning); width: 80px; text-align: right; }
    .check-status { width: 100px; text-align: right; font-size: 12px; }
    .checked-in { color: var(--bp-success); }
    .not-checked { color: rgba(255,255,255,0.4); }
    .refresh-btn { margin-bottom: 20px; }
    .top-3 { background: rgba(255,200,87,0.1); border-left: 3px solid var(--bp-warning); }
    .banner-link { position: fixed; top: 20px; left: 0px; z-index: 999; }
    .banner-link img { width: 180px; max-width: 25vw; height: auto; border: 0; }
  </style>
</head>
<body>
  <a href="https://hackclub.com/" class="banner-link">
    <img src="https://assets.hackclub.com/banners/2026.svg" alt="Hack Club">
  </a>

  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <div class="view active z1">
    <div class="leaderboard-container">
      <div class="card">
        <div class="card-eyebrow">Build Guild Kochi · April 15, 2026</div>
        <div class="card-h1">🏆 Points <span style="color:var(--bp-warning)">Leaderboard</span></div>
        <div class="card-sub">Top scorers and check-in status</div>
        
        <div class="refresh-btn">
          <button class="btn btn-outline" onclick="loadLeaderboard()">⟳ Refresh</button>
        </div>
        
        <div id="stats" style="margin-bottom: 20px; text-align: center;">
          <strong>Total Participants:</strong> <span id="total-users">-</span> | 
          <strong>Checked In:</strong> <span id="checked-in-count">-</span>
        </div>
        
        <div id="leaderboard-list">Loading...</div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    async function loadLeaderboard() {
      try {
        const usersRes = await fetch(`${API_BASE_URL}/api/admin/users-with-scores`);
        const users = await usersRes.json();
        
        const total = users.length;
        const checkedIn = users.filter(u => u.checkedIn).length;
        
        document.getElementById('total-users').textContent = total;
        document.getElementById('checked-in-count').textContent = checkedIn;
        
        // Sort by score (highest first)
        const sorted = [...users].sort((a, b) => (b.score || 0) - (a.score || 0));
        
        const container = document.getElementById('leaderboard-list');
        if (sorted.length === 0) {
          container.innerHTML = '<div style="text-align: center;">No users yet</div>';
          return;
        }
        
        container.innerHTML = sorted.map((user, index) => `
          <div class="leaderboard-item ${index < 3 ? 'top-3' : ''}">
            <div class="rank">${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}</div>
            <div class="user-info">
              <div class="username">${escapeHtml(user.username || user.name || user.email.split('@')[0])}</div>
              <div class="email">${escapeHtml(user.email)}</div>
            </div>
            <div class="score">${user.score || 0} pts</div>
            <div class="check-status ${user.checkedIn ? 'checked-in' : 'not-checked'}">
              ${user.checkedIn ? '✅ Checked In' : '⏳ Waiting'}
            </div>
          </div>
        `).join('');
        
      } catch (err) {
        console.error('Failed to load leaderboard:', err);
        document.getElementById('leaderboard-list').innerHTML = '<div style="text-align: center;">Failed to load leaderboard</div>';
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
  </script>
</body>
</html>
