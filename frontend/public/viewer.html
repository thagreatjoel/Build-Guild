<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Slide Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0e305b;
      height: 100vh;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      transition: opacity 0.2s ease, transform 0.2s ease;
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }
    .slide-counter {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.6);
      font-family: monospace;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 10;
    }
    .flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,200,87,0.3);
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
  </style>
</head>
<body>
  <iframe id="slideFrame" title="Slide Viewer"></iframe>
  <div class="slide-counter" id="counter">1 / 0</div>
  <div class="flash-overlay" id="flashOverlay"></div>

  <script>
    // ---------- CONFIGURATION ----------
    const slides = [
      "1.html",
      "2.html",
      // add more as needed
    ];
    // -----------------------------------

    let currentIndex = 0;
    let isTransitioning = false;
    const frame = document.getElementById('slideFrame');
    const counter = document.getElementById('counter');
    const flash = document.getElementById('flashOverlay');

    function updateCounter() {
      counter.textContent = `${currentIndex + 1} / ${slides.length}`;
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function loadSlide(index) {
      if (isTransitioning) return;
      if (index < 0) index = 0;
      if (index >= slides.length) index = slides.length - 1;
      if (index === currentIndex) return;

      isTransitioning = true;

      // Step 1: Fade out iframe and apply grid movement (scale + rotate)
      frame.style.opacity = '0';
      frame.style.transform = 'scale(0.95) rotate(0.5deg)';
      flash.style.opacity = '0.6';
      await delay(150);

      // Step 2: Load new slide
      currentIndex = index;
      const slideFile = slides[currentIndex];
      frame.src = `slide/${slideFile}`;
      updateCounter();

      // Step 3: Wait a bit for the iframe to start loading, then reset transform and fade in
      await delay(200);
      frame.style.opacity = '1';
      frame.style.transform = 'scale(1) rotate(0deg)';
      flash.style.opacity = '0';
      await delay(100);
      isTransitioning = false;
    }

    function nextSlide() {
      if (currentIndex + 1 < slides.length) {
        loadSlide(currentIndex + 1);
      }
    }

    function prevSlide() {
      if (currentIndex - 1 >= 0) {
        loadSlide(currentIndex - 1);
      }
    }

    // Keyboard shortcuts: 'a' next, 'q' previous
    window.addEventListener('keydown', (e) => {
      if (e.key === 'a' || e.key === 'A') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'q' || e.key === 'Q') {
        e.preventDefault();
        prevSlide();
      }
    });

    // Initial load
    if (slides.length > 0) {
      frame.src = `slide/${slides[0]}`;
      currentIndex = 0;
      updateCounter();
      frame.style.opacity = '1';
    } else {
      frame.srcdoc = '<html><body style="background:#0e305b; color:white; display:flex; justify-content:center; align-items:center;"><h1>No slides configured</h1></body></html>';
      counter.style.display = 'none';
    }
  </script>
</body>
</html>
