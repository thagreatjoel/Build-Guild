<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Viewer — Build Guild Kochi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0e305b;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .controls {
      background: #081c35;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ffc857;
      color: white;
      z-index: 10;
    }
    .controls button {
      background: transparent;
      border: 1px solid #ffc857;
      color: #ffc857;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .controls button:hover {
      background: #ffc857;
      color: #081c35;
    }
    .slide-info {
      font-size: 14px;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
    }
    .key-hint {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="prevBtn">◀ Previous (q)</button>
    <div class="slide-info">
      Slide <span id="currentIdx">1</span> / <span id="totalSlides">0</span>
    </div>
    <button id="nextBtn">Next (a) ▶</button>
  </div>
  <div class="key-hint" style="text-align: center; padding: 4px; background: #0a2540;">
    Use <kbd>q</kbd> for previous, <kbd>a</kbd> for next
  </div>
  <iframe id="slideFrame" title="Slide Viewer"></iframe>

  <script>
    // ---------- CONFIGURATION ----------
    // List all HTML files inside the "slide/" folder (relative to this page)
    // Add your slide filenames in the order you want them.
    const slides = [
      "1.html",
     
    ];
    // -----------------------------------

    let currentIndex = 0;
    const frame = document.getElementById('slideFrame');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const currentIdxSpan = document.getElementById('currentIdx');
    const totalSlidesSpan = document.getElementById('totalSlides');

    totalSlidesSpan.textContent = slides.length;

    function loadSlide(index) {
      if (index < 0) index = 0;
      if (index >= slides.length) index = slides.length - 1;
      currentIndex = index;
      const slideFile = slides[currentIndex];
      frame.src = `/slide/${slideFile}`;
      currentIdxSpan.textContent = currentIndex + 1;
      // Disable buttons at ends if desired
      prevBtn.disabled = (currentIndex === 0);
      nextBtn.disabled = (currentIndex === slides.length - 1);
    }

    function nextSlide() {
      if (currentIndex + 1 < slides.length) {
        loadSlide(currentIndex + 1);
      }
    }

    function prevSlide() {
      if (currentIndex - 1 >= 0) {
        loadSlide(currentIndex - 1);
      }
    }

    // Keyboard shortcuts
    window.addEventListener('keydown', (e) => {
      // 'a' for next, 'q' for previous
      if (e.key === 'a' || e.key === 'A') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'q' || e.key === 'Q') {
        e.preventDefault();
        prevSlide();
      }
    });

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);

    // Load first slide
    if (slides.length > 0) {
      loadSlide(0);
    } else {
      frame.srcdoc = '<html><body style="background:#0e305b; color:white; display:flex; justify-content:center; align-items:center;"><h1>No slides configured</h1><p>Edit the "slides" array in slide.html</p></body></html>';
    }
  </script>
</body>
</html>
