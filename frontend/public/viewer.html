<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Slide Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0e305b;
      height: 100vh;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    /* Optional: a tiny non‑intrusive counter (comment out if not wanted) */
    .slide-counter {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.6);
      font-family: monospace;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <iframe id="slideFrame" title="Slide Viewer"></iframe>
  <div class="slide-counter" id="counter">1 / 0</div>

  <script>
    // ---------- CONFIGURATION ----------
    // List your slide files in order (relative to the "slide/" folder)
    const slides = [
      "1.html",
      "2.html",
      // add more files: "2.html", "3.html", ...
    ];
    // -----------------------------------

    let currentIndex = 0;
    const frame = document.getElementById('slideFrame');
    const counter = document.getElementById('counter');

    function updateCounter() {
      counter.textContent = `${currentIndex + 1} / ${slides.length}`;
    }

    function loadSlide(index) {
      if (index < 0) index = 0;
      if (index >= slides.length) index = slides.length - 1;
      currentIndex = index;
      const slideFile = slides[currentIndex];
      frame.src = `slide/${slideFile}`;
      updateCounter();
    }

    function nextSlide() {
      if (currentIndex + 1 < slides.length) {
        loadSlide(currentIndex + 1);
      }
    }

    function prevSlide() {
      if (currentIndex - 1 >= 0) {
        loadSlide(currentIndex - 1);
      }
    }

    // Keyboard shortcuts: 'a' for next, 'q' for previous
    window.addEventListener('keydown', (e) => {
      if (e.key === 'a' || e.key === 'A') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'q' || e.key === 'Q') {
        e.preventDefault();
        prevSlide();
      }
    });

    // Initial load
    if (slides.length > 0) {
      loadSlide(0);
    } else {
      frame.srcdoc = '<html><body style="background:#0e305b; color:white; display:flex; justify-content:center; align-items:center;"><h1>No slides configured</h1></body></html>';
      counter.style.display = 'none';
    }
  </script>
</body>
</html>
