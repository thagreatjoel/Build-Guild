<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dashboard — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Exact same background as schedule/leaderboard ── */
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff') format('woff');
      font-weight:400;font-style:normal;font-display:swap;
    }
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff') format('woff');
      font-weight:700;font-style:normal;font-display:swap;
    }

    :root{
      --bp-lighter:#344b6a;
      --bp-dark:#0e305b;
      --bp-darker:#081c35;
      --bp-light:#dbe4ee;
      --bp-danger:#fe8e86;
      --bp-danger-darker:#bd4c44;
      --bp-warning:#ffc857;
      --bp-success:#a8f0ae;
      --f:'Phantom Sans','Poppins',sans-serif;
      --fh:'Poppins',sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 16px; }

    body {
      font-family: var(--f);
      background: var(--bp-dark);
      color: #fff;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 50px 50px;
      background-position: 0 0, 0 0;
      background-color: var(--bp-dark);
      position: relative;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse, #000000b1, transparent);
      opacity: .4;
      filter: url(#grainy);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }

    .z1 { position: relative; z-index: 1; }

    /* Banner fixed top‑left */
    .banner-link {
      position: fixed;
      top: 20px;
      left: 0px;
      z-index: 999;
    }
    .banner-link img {
      width: 180px;
      max-width: 25vw;
      height: auto;
      border: 0;
    }

    .dashboard-container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(80px, 12vh, 120px) 4vw 2vh 4vw;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Navigation */
    .nav {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 0.75rem;
    }
    .nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .nav a:hover, .nav a.active {
      color: var(--bp-warning);
    }

    /* Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
      flex: 1;
    }

    /* Cards */
    .card {
      background: var(--bp-darker);
      border: 2px solid rgba(255,255,255,.14);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--bp-warning);
    }

    /* Profile */
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--bp-warning);
      margin-bottom: 1rem;
    }
    .profile-name {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .profile-name span {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .profile-name input {
      background: var(--bp-dark);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 0.25rem 0.5rem;
      border-radius: 8px;
      font-size: 1rem;
    }
    .profile-email {
      color: rgba(255,255,255,0.6);
      margin-bottom: 1rem;
      word-break: break-all;
    }
    .btn-edit, .btn-save, .btn-upload {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.25rem 1rem;
      font-family: var(--fh);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }
    .btn-edit:hover, .btn-save:hover, .btn-upload:hover {
      background: rgba(255,200,87,0.2);
      border-color: var(--bp-warning);
    }
    .hidden { display: none; }
    .file-input { display: none; }

    .event-info-item {
      margin-bottom: 1rem;
    }
    .event-info-label {
      font-weight: 600;
      color: var(--bp-warning);
    }

    .announcement {
      background: rgba(255,200,87,0.1);
      border-left: 4px solid var(--bp-warning);
      padding: 1rem;
    }

    .staff-picks {
      background: rgba(0,0,0,0.2);
      padding: 1rem;
    }
    .staff-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .staff-name {
      font-weight: 600;
    }
    .staff-score {
      background: var(--bp-warning);
      color: var(--bp-darker);
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .logout-btn {
      margin-top: 1rem;
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 40px;
      padding: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
      font-family: var(--fh);
    }
    .logout-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--bp-warning);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      font-family: var(--fh);
      font-size: 13px;
      font-weight: 700;
      padding: 12px 18px;
      border: 2px solid;
      transform: translateY(60px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      max-width: 280px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.t-ok  { background: rgba(168,240,174,.1); color: var(--bp-success); border-color: rgba(168,240,174,.35); }
    .toast.t-err { background: rgba(254,142,134,.1); color: var(--bp-danger); border-color: var(--bp-danger-darker); }
    .toast.t-info { background: var(--bp-darker); color: var(--bp-warning); border-color: var(--bp-warning); }

    @media (max-width: 800px) {
      .dashboard-grid { grid-template-columns: 1fr; gap: 1rem; }
      .nav { gap: 1rem; }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <a href="https://hackclub.com/" class="banner-link">
    <img src="https://assets.hackclub.com/banners/2026.svg" alt="Hack Club">
  </a>

  <div class="dashboard-container z1">
    <div class="nav">
      <a href="#" class="active">Dashboard</a>
      <a href="leaderboard.html">Leaderboard</a>
    </div>

    <div class="dashboard-grid">
      <!-- Left column: Profile -->
      <div>
        <div class="card">
          <div style="text-align: center;">
            <img id="profile-avatar" class="profile-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%230e305b' stroke='%23ffc857' stroke-width='3'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='%23ffc857' font-family='monospace'%3E👤%3C/text%3E%3C/svg%3E" alt="Profile">
            <input type="file" id="avatar-input" accept="image/*" class="file-input">
            <button id="upload-btn" class="btn-upload">Change Picture</button>
          </div>
          <div class="profile-name" id="profile-name-display">
            <span id="display-name"></span>
            <button id="edit-name-btn" class="btn-edit">Edit</button>
          </div>
          <div class="profile-name hidden" id="profile-name-edit">
            <input type="text" id="edit-name-input">
            <button id="save-name-btn" class="btn-save">Save</button>
            <button id="cancel-name-btn" class="btn-edit">Cancel</button>
          </div>
          <div class="profile-email" id="profile-email"></div>
          <div class="event-info-item"><span class="event-info-label">Score:</span> <span id="user-score">0</span></div>
          <div class="event-info-item"><span class="event-info-label">Checked in:</span> <span id="user-checked">No</span></div>
          <button id="logout-btn" class="logout-btn">Log out</button>
        </div>
      </div>

      <!-- Right column: Event info & Staff picks -->
      <div>
        <div class="card">
          <h2>Upcoming Events</h2>
          <div class="announcement">
            <p><strong>Build Guild Kochi</strong><br>April 15, 2026, 10:00 AM IST<br>Tinkerspace, Kochi</p>
          </div>
        </div>

        <div class="card">
          <h2>Staff Picks</h2>
          <div id="staff-picks-list" class="staff-picks">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="config.js"></script>
  <script>
    const session = JSON.parse(localStorage.getItem('eventAccess') || '{}');
    if (!session.loggedIn || Date.now() - session.timestamp > 24 * 60 * 60 * 1000) {
      window.location.href = '/';
    }

    const userEmail = session.email;
    let currentUser = {};

    const DEFAULT_AVATAR = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="45" fill="%230e305b" stroke="%23ffc857" stroke-width="3"/%3E%3Ctext x="50" y="65" font-size="40" text-anchor="middle" fill="%23ffc857" font-family="monospace"%3E👤%3C/text%3E%3C/svg%3E';

    function resizeImage(file, maxSize = 200) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let width = img.width, height = img.height;
            if (width > height) {
              if (width > maxSize) { height *= maxSize / width; width = maxSize; }
            } else {
              if (height > maxSize) { width *= maxSize / height; height = maxSize; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function loadProfile() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/user/profile?email=${encodeURIComponent(userEmail)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        currentUser = await res.json();
        document.getElementById('display-name').textContent = currentUser.name || currentUser.username || currentUser.email.split('@')[0];
        document.getElementById('profile-email').textContent = currentUser.email;
        document.getElementById('user-score').textContent = currentUser.score || 0;
        document.getElementById('user-checked').textContent = currentUser.checkedIn ? 'Yes' : 'No';
        document.getElementById('profile-avatar').src = currentUser.profilePicture || DEFAULT_AVATAR;
      } catch (err) {
        console.error('Failed to load profile', err);
        toast('Failed to load profile', 'err');
      }
    }

    async function updateProfile(data) {
      try {
        const res = await fetch(`${API_BASE_URL}/api/user/update-profile`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail, ...data })
        });
        if (!res.ok) {
          const text = await res.text();
          throw new Error(`${res.status} ${text}`);
        }
        const result = await res.json();
        if (result.user.name) document.getElementById('display-name').textContent = result.user.name;
        if (result.user.profilePicture) document.getElementById('profile-avatar').src = result.user.profilePicture;
        toast('Profile updated!', 'ok');
      } catch (err) {
        console.error('Update failed', err);
        if (err.message.includes('413')) toast('Image too large.', 'err');
        else toast('Failed to update profile: ' + err.message, 'err');
      }
    }

    // Name editing
    document.getElementById('edit-name-btn').addEventListener('click', () => {
      document.getElementById('profile-name-display').classList.add('hidden');
      document.getElementById('profile-name-edit').classList.remove('hidden');
      document.getElementById('edit-name-input').value = currentUser.name || '';
      document.getElementById('edit-name-input').focus();
    });
    document.getElementById('save-name-btn').addEventListener('click', async () => {
      const newName = document.getElementById('edit-name-input').value.trim();
      if (newName) await updateProfile({ name: newName });
      document.getElementById('profile-name-display').classList.remove('hidden');
      document.getElementById('profile-name-edit').classList.add('hidden');
    });
    document.getElementById('cancel-name-btn').addEventListener('click', () => {
      document.getElementById('profile-name-display').classList.remove('hidden');
      document.getElementById('profile-name-edit').classList.add('hidden');
    });

    // Avatar upload
    document.getElementById('upload-btn').addEventListener('click', () => {
      document.getElementById('avatar-input').click();
    });
    document.getElementById('avatar-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        toast('Image too large (max 2MB)', 'err');
        return;
      }
      toast('Processing image...', 'info');
      try {
        const resizedBase64 = await resizeImage(file, 200);
        await updateProfile({ profilePicture: resizedBase64 });
      } catch (err) {
        toast('Failed to process image', 'err');
      }
      document.getElementById('avatar-input').value = '';
    });

    async function loadStaffPicks() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/user/leaderboard`);
        if (!res.ok) throw new Error();
        const users = await res.json();
        const top5 = users.slice(0, 5);
        const container = document.getElementById('staff-picks-list');
        if (top5.length === 0) {
          container.innerHTML = '<div class="staff-item">No picks yet – be the first!</div>';
        } else {
          container.innerHTML = top5.map(u => `
            <div class="staff-item">
              <span class="staff-name">${escapeHtml(u.username || u.name || u.email.split('@')[0])}</span>
              <span class="staff-score">${u.score} pts</span>
            </div>
          `).join('');
        }
      } catch (err) {
        container.innerHTML = '<div class="staff-item">Failed to load.</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function toast(msg, type) {
      const toastDiv = document.getElementById('toast');
      toastDiv.textContent = msg;
      toastDiv.className = `toast show t-${type}`;
      setTimeout(() => toastDiv.classList.remove('show'), 3400);
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch(`${API_BASE_URL}/api/user/login-status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, loggedIn: false })
      }).catch(console.error);
      localStorage.removeItem('eventAccess');
      window.location.href = '/';
    });

    loadProfile();
    loadStaffPicks();
    setInterval(loadStaffPicks, 30000);
  </script>
</body>
</html>
