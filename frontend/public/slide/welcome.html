<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Welcome — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Exactly the same background as schedule.html ── */
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff') format('woff');
      font-weight:400;font-style:normal;font-display:swap;
    }
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff') format('woff');
      font-weight:700;font-style:normal;font-display:swap;
    }

    :root{
      --bp-lighter:#344b6a;
      --bp-dark:#0e305b;
      --bp-darker:#081c35;
      --bp-light:#dbe4ee;
      --bp-danger:#fe8e86;
      --bp-danger-darker:#bd4c44;
      --bp-warning:#ffc857;
      --bp-success:#a8f0ae;
      --f:'Phantom Sans','Poppins',sans-serif;
      --fh:'Poppins',sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: var(--f);
      background: var(--bp-dark);
      color: #fff;
      min-height: 100vh;
      overscroll-behavior: none;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 50px 50px;
      background-position: 0 0, 0 0;
      background-color: var(--bp-dark);
      position: relative;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse, #000000b1, transparent);
      opacity: .4;
      filter: url(#grainy);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }

    .z1 {
      position: relative;
      z-index: 1;
    }

    .banner-link {
      position: fixed;
      top: 20px;
      left: 0px;
      z-index: 999;
    }
    .banner-link img {
      width: 180px;
      max-width: 25vw;
      height: auto;
      border: 0;
    }

    /* Main container – exactly like schedule.html */
    .welcome-container {
      width: 100%;
      height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(80px, 12vh, 120px) 4vw 2vh 4vw;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Title and date – same styling */
    .hero-title {
      text-align: center;
      flex-shrink: 0;
      margin-bottom: 2vh;
    }
    .hero-title h1 {
      font-family: var(--fh);
      font-size: clamp(2rem, 6vh, 5rem);
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 0.25vh;
    }
    .hero-title .welcome-text {
      color: #fff;
    }
    .hero-title .kochi {
      color: var(--bp-warning);
    }
    .event-date {
      font-size: clamp(0.8rem, 2vh, 1.2rem);
      color: rgba(255,255,255,0.6);
      margin-top: 0;
    }

    /* Card – same dark background as schedule card */
    .welcome-card {
      background: var(--bp-darker);
      border: 2px solid rgba(255,255,255,.14);
      padding: 1.5vh 2vw;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .blueprint-logo {
      max-width: 240px;
      margin-bottom: 2vh;
    }
    .blueprint-logo img {
      width: 100%;
      height: auto;
    }

    .btn-continue {
      background: transparent;
      border: 1px solid var(--bp-warning);
      border-radius: 40px;
      padding: 0.5rem 1.5rem;
      font-family: var(--fh);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
      text-decoration: none;
      display: inline-block;
      margin: 2vh 0 1vh;
    }
    .btn-continue:hover {
      background: rgba(255,200,87,0.2);
      border-color: var(--bp-warning);
      color: var(--bp-warning);
    }

    /* Sponsors – same as schedule */
    .sponsors {
      flex-shrink: 0;
      text-align: center;
      padding: 1vh 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 1vh;
    }
    .sponsors-label {
      font-size: clamp(0.6rem, 1.3vh, 0.8rem);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.5vh;
    }
    .sponsor-logos {
      display: flex;
      justify-content: center;
      gap: clamp(1rem, 3vw, 3rem);
      flex-wrap: wrap;
    }
    .sponsor {
      font-weight: 700;
      font-size: clamp(0.8rem, 1.8vh, 1.2rem);
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <a href="https://hackclub.com/" class="banner-link">
    <img src="https://assets.hackclub.com/banners/2026.svg" alt="Hack Club">
  </a>

  <div class="welcome-container z1">
    <div class="hero-title">
      <h1>
        <span class="welcome-text">Welcome to</span>
        <span class="kochi"> Build Guild</span>
      </h1>
      <div class="event-date">April 15, 2026 | Tinkerspace, Kochi</div>
    </div>

    <div class="welcome-card">
      <div class="blueprint-logo">
        <img src="https://blueprint.hackclub.com/assets/homepage_logo-3585630b.webp" alt="Blueprint">
      </div>
      <a href="/" class="btn-continue">Enter Event Portal →</a>
    </div>

    <div class="sponsors">
      <div class="sponsors-label">Proudly supported by</div>
      <div class="sponsor-logos">
        <span class="sponsor">HACKCLUB</span>
        <span class="sponsor">BLUEPRINT</span>
        <span class="sponsor">JLCPCB</span>
        <span class="sponsor">OSHWELD</span>
        <span class="sponsor">EASYEDA</span>
      </div>
    </div>
  </div>
</body>
</html>
