<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Welcome — Build Guild Kochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Same background as schedule.html ── */
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff') format('woff');
      font-weight:400;font-style:normal;font-display:swap;
    }
    @font-face {
      font-family:'Phantom Sans';
      src:url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff2') format('woff2'),
          url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Bold.woff') format('woff');
      font-weight:700;font-style:normal;font-display:swap;
    }

    :root{
      --bp-lighter:#344b6a;
      --bp-dark:#0e305b;
      --bp-darker:#081c35;
      --bp-light:#dbe4ee;
      --bp-danger:#fe8e86;
      --bp-danger-darker:#bd4c44;
      --bp-warning:#ffc857;
      --bp-success:#a8f0ae;
      --f:'Phantom Sans','Poppins',sans-serif;
      --fh:'Poppins',sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: var(--f);
      background: var(--bp-dark);
      color: #fff;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 50px 50px;
      background-position: 0 0, 0 0;
      background-color: var(--bp-dark);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Grain overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse, #000000b1, transparent);
      opacity: .4;
      filter: url(#grainy);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }

    .z1 {
      position: relative;
      z-index: 1;
    }

    /* Hack Club banner fixed top‑left */
    .banner-link {
      position: fixed;
      top: 20px;
      left: 0px;
      z-index: 999;
    }
    .banner-link img {
      width: 180px;
      max-width: 25vw;
      height: auto;
      border: 0;
    }

    /* Main container – no card, just centered content */
    .welcome-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: clamp(80px, 12vh, 120px) 2rem;
      text-align: center;
    }

    .blueprint-logo {
      max-width: 240px;
      margin: 0 auto 1.5rem;
    }
    .blueprint-logo img {
      width: 100%;
      height: auto;
    }

    .event-title {
      font-family: var(--fh);
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--bp-warning);
      margin-bottom: 0.5rem;
    }
    .event-subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 2rem;
    }

    /* Button */
    .btn-continue {
      background: transparent;
      border: 1px solid var(--bp-warning);
      border-radius: 40px;
      padding: 0.5rem 1.5rem;
      font-family: var(--fh);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
      text-decoration: none;
      display: inline-block;
      margin-top: 1rem;
    }
    .btn-continue:hover {
      background: rgba(255,200,87,0.2);
      border-color: var(--bp-warning);
      color: var(--bp-warning);
    }

    /* Sponsor footer */
    .sponsors {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .sponsors-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.5rem;
    }
    .sponsor-logos {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .sponsor {
      font-weight: 700;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
    }

    @media (max-width: 600px) {
      .event-title {
        font-size: 1.8rem;
      }
      .welcome-container {
        padding: clamp(80px, 12vh, 120px) 1rem;
      }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <a href="https://hackclub.com/" class="banner-link">
    <img src="https://assets.hackclub.com/banners/2026.svg" alt="Hack Club">
  </a>

  <div class="welcome-container z1">
    <div class="blueprint-logo">
      <img src="https://blueprint.hackclub.com/assets/homepage_logo-3585630b.webp" alt="Blueprint">
    </div>
    <div class="event-title">Build Guild Kochi</div>
    <div class="event-subtitle">April 15, 2026 · Tinkerspace, Kochi</div>

    <a href="/" class="btn-continue">Enter Event Portal →</a>

    <div class="sponsors">
      <div class="sponsors-label">Proudly supported by</div>
      <div class="sponsor-logos">
        <span class="sponsor">HACKCLUB</span>
        <span class="sponsor">BLUEPRINT</span>
        <span class="sponsor">JLCPCB</span>
        <span class="sponsor">OSHWELD</span>
        <span class="sponsor">EASYEDA</span>
      </div>
    </div>
  </div>
</body>
</html>
