
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Build Guild Kochi — Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bp-dark);
    }
    
    .schedule-card {
      max-width: 900px;
      width: 100%;
      background: var(--bp-darker);
      border: 2px solid var(--bp-warning);
      padding: 32px 36px;
      animation: rise 0.4s cubic-bezier(.16,1,.3,1);
    }
    
    /* Header with logo and title */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .blueprint-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .blueprint-logo img {
      height: 48px;
      width: auto;
    }
    
    .event-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    
    .event-title .kochi {
      color: var(--bp-warning);
    }
    
    .event-date {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-top: 8px;
    }
    
    /* Schedule grid - 2 columns, no extra spacing */
    .schedule-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .time-column {
      background: rgba(0,0,0,0.3);
      padding: 16px;
      border-left: 3px solid var(--bp-warning);
    }
    
    .time-slot {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    
    .time-slot:last-child {
      border-bottom: none;
    }
    
    .time {
      min-width: 80px;
      font-weight: 700;
      color: var(--bp-warning);
      font-size: 13px;
      font-family: monospace;
    }
    
    .event-name {
      font-weight: 600;
      font-size: 14px;
      color: #fff;
    }
    
    /* Special highlight for lunch and surprise */
    .time-slot.highlight .event-name {
      color: var(--bp-warning);
    }
    
    /* Compact and clean */
    @media (max-width: 700px) {
      .schedule-card {
        padding: 20px;
      }
      .schedule-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .event-title {
        font-size: 22px;
      }
      .blueprint-logo img {
        height: 36px;
      }
    }
    
    @media (max-width: 480px) {
      .schedule-card {
        padding: 16px;
      }
      .time-slot {
        gap: 10px;
      }
      .time {
        min-width: 70px;
        font-size: 11px;
      }
      .event-name {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <div class="schedule-card">
    <!-- Header with Blueprint logo -->
    <div class="header">
      <div class="blueprint-logo">
        <img src="https://blueprint.hackclub.com/assets/homepage_logo-3585630b.webp" alt="Blueprint" onerror="this.style.display='none'">
      </div>
      <div class="event-title">
        <span>Build Guild</span> <span class="kochi">Kochi</span>
      </div>
      <div class="event-date">April 13–19, 2026</div>
    </div>

    <!-- Schedule Grid - Two Columns -->
    <div class="schedule-grid">
      <!-- Left Column - Morning -->
      <div class="time-column">
        <div class="time-slot">
          <div class="time">10:00 AM</div>
          <div class="event-name">Arrival & Check-in</div>
        </div>
        <div class="time-slot">
          <div class="time">10:30 AM</div>
          <div class="event-name">Kickoff & Welcome</div>
        </div>
        <div class="time-slot">
          <div class="time">11:00 AM</div>
          <div class="event-name">Soldering 101</div>
        </div>
        <div class="time-slot highlight">
          <div class="time">01:00 PM</div>
          <div class="event-name">Lunch Break 🥗</div>
        </div>
      </div>

      <!-- Right Column - Afternoon -->
      <div class="time-column">
        <div class="time-slot">
          <div class="time">02:00 PM</div>
          <div class="event-name">Soldering Marathon & Events</div>
        </div>
        <div class="time-slot">
          <div class="time">06:30 PM</div>
          <div class="event-name">Project Demos & Winner Announcement</div>
        </div>
        <div class="time-slot highlight">
          <div class="time">07:00 PM</div>
          <div class="event-name">Surprise !!</div>
        </div>
        <div class="time-slot">
          <div class="time">07:30 PM</div>
          <div class="event-name">Closing & Group Photo</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</body>
</html>
