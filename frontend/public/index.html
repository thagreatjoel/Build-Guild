<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Guild Kochi — Event Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <style>
    .otp-container { max-width: 500px; margin: 0 auto; }
    .otp-input { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
    .otp-input input { width: 60px; height: 60px; text-align: center; font-size: 24px; font-weight: 700; background: var(--bp-dark); border: 2px solid rgba(255,255,255,.18); color: #fff; border-radius: 8px; }
    .otp-input input:focus { border-color: var(--bp-warning); outline: none; }
    .resend-btn { background: none; border: none; color: var(--bp-warning); cursor: pointer; font-size: 14px; margin-top: 10px; }
    .resend-btn:hover { text-decoration: underline; }
    .email-display { background: rgba(255,200,87,0.1); padding: 10px; border-radius: 8px; margin: 15px 0; text-align: center; }
    .hackclub-banner { position: fixed; top: 10px; left: 10px; z-index: 999; }
    .hackclub-banner img { width: 150px; height: auto; }
  </style>
</head>
<body>
  <a href="https://hackclub.com/" class="hackclub-banner">
    <img src="https://assets.hackclub.com/banners/2026.svg" alt="Hack Club">
  </a>

  <svg width="0" height="0" style="position:fixed">
    <filter id="grainy" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".5" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </svg>

  <div class="view active z1">
    <div class="card otp-container">
      <div class="card-eyebrow">Build Guild Kochi · April 2026</div>
      <div class="card-h1">Event <span style="color:var(--bp-warning)">Access</span></div>
      <div class="card-sub">Enter your email to receive a one-time password</div>

      <div id="email-step">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        </div>
        <button class="btn btn-primary btn-block" onclick="sendOTP()">Send OTP →</button>
        <div class="msg err" id="err-msg"></div>
      </div>

      <div id="otp-step" style="display: none;">
        <div class="email-display" id="email-display"></div>
        <div class="field">
          <label>Enter 6-digit OTP</label>
          <div class="otp-input">
            <input type="text" maxlength="1" class="otp-digit" data-index="0">
            <input type="text" maxlength="1" class="otp-digit" data-index="1">
            <input type="text" maxlength="1" class="otp-digit" data-index="2">
            <input type="text" maxlength="1" class="otp-digit" data-index="3">
            <input type="text" maxlength="1" class="otp-digit" data-index="4">
            <input type="text" maxlength="1" class="otp-digit" data-index="5">
          </div>
        </div>
        <button class="btn btn-primary btn-block" onclick="verifyOTP()">Verify & Login →</button>
        <button class="resend-btn" onclick="resendOTP()">Resend OTP</button>
        <button class="resend-btn" onclick="goBack()">← Back to email</button>
        <div class="msg err" id="otp-err-msg"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const approvedEmails = new Set([
      "joeljonah06@gmail.com",
      "albinanil813@gmail.com",
      "dark1234abc@gmail.com",
      "sohannd00@gmail.com",
      "navaneeth3029@gmail.com",
      "zeofrostergaming@gmail.com",
      "realjakeojeff@gmail.com",
      "drkkraken22@gmail.com",
      "hardrikthomasshaji@gmail.com",
      "hannasusanshaji@gmail.com",
      "akshaimanoj117@gmail.com",
      "sivanandkuttikkol@gmail.com",
      "tthejusr@gmail.com",
      "fmuhammed344@gmail.com",
      "pelbe7365@gmail.com",
      "myaseenmc@aol.com",
      "johanabraham345@gmail.com",
      "misbahudheen123k@gmail.com",
      "brightitkumbazha@gmail.com",
      "lastsurvivor857@gmail.com",
      "krisazhoor@gmail.com",
      "arjunmanoj117@gmail.com",
      "mhdameenamz@gmail.com",
      "gopuabhayan5@gmail.com",
      "aimanezumangad@gmail.com",
      "intheknightriders@gmail.com",
      "danielzanthosh@gmail.com",
      "arungeorgesaji@gmail.com",
      "albinrstalin4@gmail.com"
    ]);

    let currentEmail = "";

    // Check if already logged in
    const session = JSON.parse(localStorage.getItem('eventAccess') || '{}');
    if (session.loggedIn && Date.now() - session.timestamp < 24 * 60 * 60 * 1000) {
      window.location.href = '/event-dashboard.html';
    }

    async function recordLogin(email) {
      try {
        await fetch(`${API_BASE_URL}/api/user/login-status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, loggedIn: true })
        });
      } catch (err) {
        console.error('Failed to record login:', err);
      }
    }

    async function sendOTP() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const errDiv = document.getElementById('err-msg');
      errDiv.style.display = 'none';

      if (!email) {
        errDiv.textContent = 'Please enter your email';
        errDiv.style.display = 'block';
        return;
      }

      if (!approvedEmails.has(email)) {
        errDiv.textContent = 'This email is not registered for this event.';
        errDiv.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/api/user/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
          currentEmail = email;
          toast('OTP sent to your email!', 'ok');
          document.getElementById('email-step').style.display = 'none';
          document.getElementById('otp-step').style.display = 'block';
          document.getElementById('email-display').textContent = email;
          document.querySelectorAll('.otp-digit').forEach(input => input.value = '');
          document.querySelector('.otp-digit').focus();
        } else {
          errDiv.textContent = data.msg || 'Failed to send OTP';
          errDiv.style.display = 'block';
        }
      } catch (err) {
        errDiv.textContent = 'Network error. Please try again.';
        errDiv.style.display = 'block';
      }
    }

    async function verifyOTP() {
      const digits = document.querySelectorAll('.otp-digit');
      const enteredOTP = Array.from(digits).map(d => d.value).join('');
      const errDiv = document.getElementById('otp-err-msg');
      errDiv.style.display = 'none';

      if (enteredOTP.length !== 6) {
        errDiv.textContent = 'Please enter complete 6-digit OTP';
        errDiv.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/api/user/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, otp: enteredOTP })
        });
        const data = await res.json();
        if (res.ok) {
  await recordLogin(currentEmail);
  localStorage.setItem('eventAccess', JSON.stringify({
    email: currentEmail,
    loggedIn: true,
    timestamp: Date.now()
  }));
  toast('Login successful!', 'ok');
  setTimeout(() => {
    window.location.href = '/waiting.html';
  }, 1500);

        } else {
          errDiv.textContent = data.msg || 'Invalid OTP';
          errDiv.style.display = 'block';
        }
      } catch (err) {
        errDiv.textContent = 'Network error. Please try again.';
        errDiv.style.display = 'block';
      }
    }

    async function resendOTP() {
      if (!currentEmail) return;
      toast('Resending OTP...', 'info');
      try {
        const res = await fetch(`${API_BASE_URL}/api/user/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail })
        });
        const data = await res.json();
        if (res.ok) {
          toast('New OTP sent to your email!', 'ok');
        } else {
          toast(data.msg || 'Failed to resend', 'err');
        }
      } catch (err) {
        toast('Network error', 'err');
      }
    }

    function goBack() {
      document.getElementById('email-step').style.display = 'block';
      document.getElementById('otp-step').style.display = 'none';
      document.getElementById('email').value = '';
      document.getElementById('err-msg').style.display = 'none';
    }

    function toast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show t-${type}`;
      setTimeout(() => t.classList.remove('show'), 3400);
    }

    // Auto-tab between OTP inputs
    document.querySelectorAll('.otp-digit').forEach((input, index, arr) => {
      input.addEventListener('keyup', (e) => {
        if (e.target.value.length === 1 && index < arr.length - 1) {
          arr[index + 1].focus();
        }
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          arr[index - 1].focus();
        }
      });
    });
  </script>
</body>
</html>
